# 文件名: .github/workflows/test-telegram.yml
# 用途: 纯测试 Telegram 通知，手动触发即可

name: 测试 Telegram 通知

# 仅手动触发（不需要提交代码，点一下就运行）
on:
  workflow_dispatch:

jobs:
  test-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 发送测试消息到 Telegram
        uses: appleboy/telegram-action@master
        with:
          # 你的机器人Token（直接填写，也可以用secrets）
          token: 8625012942:AAF43wef589S7cFVGGstxMjwoiVAbG6gWU0
          # 你的Chat ID
          to: 709893683
          # 测试消息内容
          message: |
            🧪 GitHub Actions 测试成功！
            ✅ 机器人连接正常
            ✅ Chat ID 配置正确
            🚀 可以用于编译通知啦！
          # 消息格式
          format: markdown
